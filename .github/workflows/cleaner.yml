name: Manga Auto Cleaner Engine with MangaScourX

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  clean-manga:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify mangascourx
      run: |
        python -c "
        import mangascourx
        print('✅ mangascourx', mangascourx.__version__)
        from mangascourx import MangaCleanPipeline
        print('✅ MangaCleanPipeline جاهز')
        "

    - name: Run Cleaner
      run: python cleaner.py

    - name: Commit Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/
        git diff-index --quiet HEAD || git commit -m "🧼 تبييض وتنظيف تلقائي بواسطة MangaScourX"
        git push origin main || echo "No changes"
