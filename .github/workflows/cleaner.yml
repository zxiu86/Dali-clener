name: Manga Auto Cleaner Engine with MangaScourX

# التعديل: جعل الوورك فلو يشتغل عند أي تغيير يصير بكل الملفات والمجلدات
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  clean-manga:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # تفعيل الكاش لتسريع تحميل الموديلات بـ EasyOCR

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git

    - name: Install Core Library Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # الخيار الثاني: سحب مستودع المبرمج وتغيير اسم المجلد ليتوافق مع استدعائك بـ cleaner.py
    - name: Clone MangaScourX Repository Locally
      run: |
        git clone https://github.com/zxiu86/MangaScourX.git
        mv MangaScourX MangaScourX_Repo
        mv MangaScourX_Repo/mangascour ./MangaScourX

    - name: Run MangaScourX Cleaner Engine
      run: python cleaner.py

    - name: Commit and Push Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/*
        git diff-index --quiet HEAD || git commit -m "🧼 تم التبييض والتنظيف الاحترافي بواسطة وحش MangaScourX محلياً!"
        git push origin main || echo "No changes to push or branch protected."
