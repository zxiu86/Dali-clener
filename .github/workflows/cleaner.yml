name: dailau cleaner

on:
  push:
    paths:
      - 'raw_img/**'

jobs:
  clean-manga:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Pip Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache EasyOCR Models
      uses: actions/cache@v4
      with:
        path: ~/.EasyOCR
        key: ${{ runner.os }}-easyocr-models
        restore-keys: |
          ${{ runner.os }}-easyocr-models-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Cleaner Engine
      run: python cleaner.py

    - name: Commit and Push Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/*
        git diff-index --quiet HEAD || git commit -m "🧼 تم تبييض الفصل بنجاح ساحق!"
        git push
        path: ~/.EasyOCR
        key: ${{ runner.os }}-easyocr-models
        restore-keys: |
          ${{ runner.os }}-easyocr-models-

    # الخطوة هـ: تثبيت المكتبات
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # الخطوة و: تشغيل محرك التبييض
    - name: Run Cleaner Engine
      run: python cleaner.py

    # الخطوة ز: حفظ التغييرات ودفع الصور المبيضة
    - name: Commit and Push Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/*
        git diff-index --quiet HEAD || git commit -m "🧼 تم تبييض الفصل بنجاح ساحق!"
        git push
      with:
        path: ~/.EasyOCR
        key: ${{ runner.os }}-easyocr-models
        restore-keys: |
          ${{ runner.os }}-easyocr-models-

    # الخطوة هـ: تثبيت المكتبات (إذا ما لقاها بالكاش راح ينزلها)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # الخطوة و: المعركة الكبرى - تشغيل محرك التبييض
    - name: Run Cleaner Engine
      run: python cleaner.py

    # الخطوة ز: حفظ التغييرات ودفع الصور المبيضة إلى مجلد clean_img
    - name: Commit and Push Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/*
        # السطر القادم يمنع السيرفر من الكراش إذا ما لقى شي جديد يرفعه
        git diff-index --quiet HEAD || git commit -m "🧼 تم تبييض الفصل بنجاح ساحق!"
        git push
