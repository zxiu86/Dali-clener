name: Manga Auto Cleaner Engine

on:
  push:
    paths:
      - 'raw_img/**'

jobs:
  clean-manga:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless easyocr numpy fal-client

    - name: Run Cleaner Engine
      env:
        FAL_KEY: ${{ secrets.FAL_KEY }} # 🔥 هنا مررنا السلاح السري للسيرفر بأمان
      run: python cleaner.py

    - name: Commit and Push Cleaned Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Zizo-Auto-Cleaner"
        git add clean_img/*
        git diff-index --quiet HEAD || git commit -m "🧼 تم التبييض التوليدي الذكي بنجاح ساحق!"
        git push origin main --force
        git push origin main --force


